<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TDT FullScreen Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 1rem;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 1.4rem;
            margin-bottom: 0.25rem;
        }

        .sub {
            text-align: center;
            color: #aaa;
            font-size: 0.7rem;
            margin-bottom: 1.2rem;
        }

        /* Grupos de canales */
        .channel-group {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 0.75rem;
            margin-bottom: 1rem;
        }

        .group-title {
            color: #00b4d8;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            padding-left: 0.25rem;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.5rem;
        }

        .channel-btn {
            background: #2d2d44;
            border: none;
            color: white;
            padding: 0.7rem 0.3rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .channel-btn:active {
            background: #0077b6;
            transform: scale(0.96);
        }

        /* Reproductor oculto inicialmente */
        .player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1000;
            display: none;
            flex-direction: column;
            background-color: #000;
        }

        .player-overlay.active {
            display: flex;
        }

        .player-header {
            background: rgba(0,0,0,0.9);
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .channel-name {
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            gap: 0.8rem;
        }

        .ctrl-btn {
            background: #333;
            border: none;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .ctrl-btn.fullscreen {
            background: #0077b6;
        }

        .ctrl-btn.close {
            background: #dc2626;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: black;
        }

        .info-note {
            margin-top: 1rem;
            font-size: 0.65rem;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

<h1>📺 TDT FullScreen</h1>
<div class="sub">Pulsa un canal → abre reproductor con botón 🖥️ pantalla completa</div>

<div id="channelsContainer"></div>
<div class="info-note">
    ⚡ Al abrir el canal, pulsa el botón <span style="color:#00b4d8">【⛶ Pantalla completa】</span> para forzarla en tu móvil.
</div>

<!-- Reproductor en overlay -->
<div class="player-overlay" id="playerOverlay">
    <div class="player-header">
        <span class="channel-name" id="currentChannelName">Canal</span>
        <div class="controls">
            <button class="ctrl-btn fullscreen" id="fullscreenBtn">⛶ Pantalla completa</button>
            <button class="ctrl-btn close" id="closePlayerBtn">✕ Cerrar</button>
        </div>
    </div>
    <iframe id="playerIframe" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<script>
    // LISTA DE CANALES (web oficiales)
    const channels = [
        // Mediaset
        { name: "Telecinco", url: "https://www.mitele.es/directo/telecinco", group: "📺 Mediaset" },
        { name: "Cuatro", url: "https://www.mitele.es/directo/cuatro", group: "📺 Mediaset" },
        { name: "Boing", url: "https://www.mitele.es/directo/boing", group: "📺 Mediaset" },
        { name: "Divinity", url: "https://www.mitele.es/directo/divinity", group: "📺 Mediaset" },
        { name: "Energy", url: "https://www.mitele.es/directo/energy", group: "📺 Mediaset" },
        { name: "FDF", url: "https://www.mitele.es/directo/fdf", group: "📺 Mediaset" },
        { name: "Be Mad", url: "https://www.mitele.es/directo/bemad", group: "📺 Mediaset" },
        // Atresmedia
        { name: "Antena 3", url: "https://www.atresplayer.com/directos/antena-3", group: "🎬 Atresmedia" },
        { name: "La Sexta", url: "https://www.atresplayer.com/directos/la-sexta", group: "🎬 Atresmedia" },
        { name: "Neox", url: "https://www.atresplayer.com/directos/neox", group: "🎬 Atresmedia" },
        { name: "Nova", url: "https://www.atresplayer.com/directos/nova", group: "🎬 Atresmedia" },
        { name: "Mega", url: "https://www.atresplayer.com/directos/mega", group: "🎬 Atresmedia" },
        { name: "Atreseries", url: "https://www.atresplayer.com/directos/atreseries", group: "🎬 Atresmedia" },
        // RTVE
        { name: "La 1", url: "https://www.rtve.es/directo/la-1", group: "🇪🇸 RTVE" },
        { name: "La 2", url: "https://www.rtve.es/directo/la-2", group: "🇪🇸 RTVE" },
        { name: "24h", url: "https://www.rtve.es/directo/24h", group: "🇪🇸 RTVE" },
        { name: "Clan", url: "https://www.rtve.es/directo/clan", group: "🇪🇸 RTVE" },
        { name: "Teledeporte", url: "https://www.rtve.es/directo/teledeporte", group: "🇪🇸 RTVE" }
    ];

    // DOM elements
    const container = document.getElementById('channelsContainer');
    const overlay = document.getElementById('playerOverlay');
    const iframe = document.getElementById('playerIframe');
    const channelNameSpan = document.getElementById('currentChannelName');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const closeBtn = document.getElementById('closePlayerBtn');

    let currentIframeSrc = '';

    // Agrupar canales
    const groups = {};
    channels.forEach(ch => {
        if (!groups[ch.group]) groups[ch.group] = [];
        groups[ch.group].push(ch);
    });

    // Renderizar botones
    let html = '';
    for (const [groupName, groupChannels] of Object.entries(groups)) {
        html += `<div class="channel-group">`;
        html += `<div class="group-title">${groupName}</div>`;
        html += `<div class="channels-grid">`;
        groupChannels.forEach(ch => {
            html += `<button class="channel-btn" data-name="${ch.name}" data-url="${ch.url}">${ch.name}</button>`;
        });
        html += `</div></div>`;
    }
    container.innerHTML = html;

    // Abrir canal en el overlay
    function openChannel(name, url) {
        currentIframeSrc = url;
        iframe.src = url;
        channelNameSpan.textContent = name;
        overlay.classList.add('active');
    }

    // Cerrar y limpiar
    function closePlayer() {
        overlay.classList.remove('active');
        iframe.src = ''; // para parar el vídeo
    }

    // PANTALLA COMPLETA FORZADA (API nativa)
    function forceFullscreen() {
        const elem = overlay; // hace fullscreen de todo el overlay (iframe + cabecera)
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { /* Safari */
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) { /* IE/Edge */
            elem.msRequestFullscreen();
        }
    }

    // Eventos
    document.querySelectorAll('.channel-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const name = btn.getAttribute('data-name');
            const url = btn.getAttribute('data-url');
            openChannel(name, url);
        });
    });

    fullscreenBtn.addEventListener('click', forceFullscreen);
    closeBtn.addEventListener('click', closePlayer);
</script>
</body>
</html>
